/* ===== 기준 데이터 (2025년 도시근로자 월평균소득 100%) ===== */
const BASE100 = {3:7533763, 4:8802202, 5:9326985};
function incThr(size, pct){ const b = BASE100[Math.min(Math.max(size||3,1),5) <=3 ? 3 : Math.min(size,5)]; return b ? Math.round(b*pct/100) : null; }
function manwon(n){ return (n/10000).toLocaleString('ko-KR'); }

/* ===== 프로필 ===== */
const PKEY = "cheongyak_profile_v1";
function loadProfile(){ try{ return JSON.parse(localStorage.getItem(PKEY)); }catch(e){ return null; } }
function saveProfile(p){ localStorage.setItem(PKEY, JSON.stringify(p)); }
const REQUIRED = ["noHome","marital","hasAccount","householdSize","monthlyIncome","dualIncome"];
function profileComplete(p){ return p && REQUIRED.every(k=> p[k]!==undefined && p[k]!=='' ); }

/* ===== 가점 (84점) ===== */
function scoreNoHome(y){ if(y==null||y==="") return 0; y=+y; if(y<1) return 2; return Math.min(32, 4+(Math.floor(y)-1)*2); }
function scoreDep(n){ if(n==null||n==="") return 0; n=+n; return Math.min(35, 5+n*5); }
function scoreAcct(m){ if(m==null||m==="") return 0; m=+m; if(m<6) return 1; if(m<12) return 2; return Math.min(17, 3+(Math.floor(m/12)-1)); }
function gapScore(p){ const a=scoreNoHome(p.noHomeYears), b=scoreDep(p.dependents), c=scoreAcct(p.acctMonths); return {a,b,c,total:a+b+c}; }

/* ===== 판정 ===== */
function V(status,label,reasons,extra){ return {status,label,reasons:reasons||[],extra:extra||null}; }
function R(t,txt){ return {t,txt}; }
function isPublic(L){ return L.gubun === "국민"; }
function isRegulated(L){ return !!(L.regSpec || L.regAdj); }
function regLabel(L){ const a=[]; if(L.regSpec)a.push("투기과열지구"); if(L.regAdj)a.push("조정대상지역"); return a.length? a.join("·") : "비규제지역"; }

function incomeCheck(p, L, type){
  const size = +p.householdSize;
  if(!size || p.monthlyIncome==null || p.monthlyIncome===''){
    return {ok:false, tier:'입력필요', line:{cls:'inc-chk', txt:'소득 판정 불가 — 가구원 수·월평균소득을 입력하세요.'}};
  }
  if(size>=6) return {ok:true, tier:'확인', line:{cls:'inc-chk', txt:'가구원 6인 이상 — 소득기준은 공고문에서 확인하세요.'}};
  const pub = isPublic(L);
  const income = (+p.monthlyIncome)*10000; const dual = !!p.dualIncome;
  let pri, gen;
  if(type==='newlywed'){ pri = dual?120:100; gen = pub ? (dual?140:130) : (dual?160:140); }
  else if(type==='first'){ pri = dual?120:100; if(!pub){ pri=100; } gen = pub ? (dual?140:130) : 130; }
  else { pri = dual?120:100; gen = dual?150:140; }
  const tPri = incThr(size, pri), tGen = incThr(size, gen);
  const asset = (p.realEstate!=null && p.realEstate!=='') ? (+p.realEstate)*10000 : null;
  const AL = 331000000;
  const ctx = '(가구 '+size+'인·'+(dual?'맞벌이':'외벌이')+', 내 월소득 '+manwon(income)+'만원)';
  const extra = (L.htype==='나눔형') ? ' ※나눔형은 소득 130%(맞벌이 200%)·순자산 기준 별도 — 공고 확인.' : '';
  if(income <= tPri) return {ok:true, tier:'우선공급', line:{cls:'inc-ok', txt:'소득 요건 충족 — 우선공급 구간(기준 '+pri+'%, '+manwon(tPri)+'만원 이하) '+ctx+extra}};
  if(income <= tGen) return {ok:true, tier:'일반공급', line:{cls:'inc-ok', txt:'소득 요건 충족 — 일반공급 구간(기준 '+gen+'%, '+manwon(tGen)+'만원 이하) '+ctx+extra}};
  if(asset!=null){
    if(asset<=AL) return {ok:true, tier:'추첨', line:{cls:'inc-ok', txt:'소득 초과이나 부동산가액 '+manwon(asset)+'만원 ≤ 3억3,100만원 → 추첨공급 대상 '+ctx}};
    return {ok:false, tier:'초과', line:{cls:'inc-no', txt:'소득 미충족 — 일반공급 기준('+gen+'%, '+manwon(tGen)+'만원) 초과 & 부동산가액 3억3,100만원 초과 '+ctx}};
  }
  return {ok:false, tier:'추첨확인', line:{cls:'inc-chk', txt:'소득이 일반공급 기준('+gen+'%, '+manwon(tGen)+'만원) 초과 — 부동산가액 3억3,100만원 이하면 추첨 가능. 부동산가액을 입력하세요 '+ctx}};
}

function judgeGeneral(p, L){
  const rs = []; const pub = isPublic(L); const reg = isRegulated(L);
  if(!p.hasAccount){ rs.push(R('no','청약통장이 없어 청약 불가.')); return V('no','청약 불가', rs); }
  let rank2 = false;
  if(pub){
    if(p.noHome===false){ return V('no','청약 불가', [R('no','공공(국민)주택 일반공급은 무주택세대구성원만 신청 가능 → 유주택 불가.')]); }
    rs.push(R('ok','무주택세대구성원 요건 충족.'));
    if((+p.acctMonths>=24)&&(+p.acctCount>=24)) rs.push(R('ok','통장 24개월·24회 이상 → 1순위(수도권 공공 기준).'));
    else if((+p.acctMonths>=12)&&(+p.acctCount>=12)){ rs.push(R('info','통장 12개월·12회 이상 → 1순위(수도권 공공 일반 기준). 대규모택지/투기과열은 가입 24개월·24회가 필요할 수 있어 공고 확인.')); }
    else { rank2=true; rs.push(R('info','통장 12개월/12회 미만 → 2순위(수도권 기준).')); }
    rs.push(R('info','1순위 경쟁 시 순차제(무주택 3년 이상·저축총액/납입횟수)로 선정.'));
    return V(rank2?'check':'ok', rank2?'2순위 청약 가능':'1순위 청약 가능', rs);
  } else {
    if(reg){
      rs.push(R('info','규제지역('+regLabel(L)+') — 1순위 요건: 무주택 세대주 + 통장 가입 24개월·예치금 충족 + 과거 5년 내 세대 당첨 이력 없음.'));
      const okHome = p.noHome!==false, okHead = p.householder===true, okAcct = (+p.acctMonths>=24);
      rs.push(okHome? R('ok','무주택 요건 충족.') : R('no','규제지역 1순위는 무주택 세대여야 합니다.'));
      rs.push(okHead? R('ok','세대주 요건 충족.') : R('no','규제지역 1순위는 세대주만 신청 가능(세대원 불가).'));
      rs.push(okAcct? R('ok','통장 24개월 이상 요건 충족(예치금은 공고 확인).') : R('no','규제지역 1순위는 통장 가입 24개월 이상 필요.'));
      const anyNo = rs.some(r=>r.t==='no');
      const g = gapScore(p);
      rs.push(R('info','규제지역은 가점제 비중이 큽니다(전용 85㎡ 이하 가점 40%+추첨, 85㎡ 초과 추첨). 아래 가점 참고.'));
      return V(anyNo?'no':'ok', anyNo?'1순위 요건 미충족':'1순위 청약 가능', rs, {gap:g});
    } else {
      if(+p.acctMonths>=12) rs.push(R('ok','통장 12개월 이상 → 1순위(수도권 비규제 기준). 면적별 예치금 충족은 공고 확인.'));
      else { rank2=true; rs.push(R('info','통장 12개월 미만 → 2순위.')); }
      rs.push(R('info','비규제 지역은 유주택자도 청약 가능(추첨). 1순위 경쟁 시 가점제+추첨.'));
      const g = gapScore(p);
      return V(rank2?'check':'ok', rank2?'2순위 청약 가능':'1순위 청약 가능', rs, {gap:g});
    }
  }
}

/* ===== 특공 조건 체크리스트 판정 ===== */
function mrow(k,req,mine,st){ return {k,req,mine,st}; }
function thrPair(L,type,p){
  const size=+p.householdSize||3, dual=!!p.dualIncome, pub=isPublic(L);
  let pri,gen;
  if(type==='newlywed'){ pri=dual?120:100; gen=pub?(dual?140:130):(dual?160:140); }
  else if(type==='first'){ pri=pub?(dual?120:100):100; gen=pub?(dual?140:130):130; }
  else { pri=dual?120:100; gen=dual?150:140; }
  return {size,dual,pri,gen,tPri:incThr(size,pri),tGen:incThr(size,gen)};
}
function incomeRow(p,L,type){
  const size=+p.householdSize;
  if(!size||p.monthlyIncome==null||p.monthlyIncome===''){ return {row:mrow('소득(월)','가구원수·월소득 입력 필요','미입력','chk'), tier:null}; }
  if(size>=6){ return {row:mrow('소득(월)','6인 이상 공고 확인','-','chk'), tier:null}; }
  const t=thrPair(L,type,p); const income=(+p.monthlyIncome)*10000; const mine=manwon(income)+'만원';
  const req='우선 '+manwon(t.tPri)+'만↓ / 일반 '+manwon(t.tGen)+'만↓';
  if(income<=t.tGen) return {row:mrow('소득(월)',req,mine,'ok'), tier: income<=t.tPri?'우선공급':'일반공급'};
  const asset=(p.realEstate!=null&&p.realEstate!=='')?(+p.realEstate)*10000:null;
  if(asset==null) return {row:mrow('소득(월)',req+' · 초과 시 부동산 3.31억↓ 추첨',mine+'(초과)','chk'), tier:'추첨확인'};
  if(asset<=331000000) return {row:mrow('소득(월)','기준 초과·부동산 3.31억↓ 추첨',mine+' / 자산 '+manwon(asset)+'만','chk'), tier:'추첨'};
  return {row:mrow('소득(월)',req,mine+' / 자산 '+manwon(asset)+'만(초과)','no'), tier:'초과'};
}
function marryMine(p){ return p.marital==='기혼'?('혼인 '+Math.floor((+p.marriageMonths||0)/12)+'년'):(p.marital||'-'); }
function pastRow(p){ if(p.pastSpecial!==true) return null; const ex=(p.marital==='기혼'||p.marital==='예비'); return mrow('특공 당첨이력', ex?'배우자 혼인 전 당첨은 예외':'세대 당첨 이력 없어야', '있음', ex?'chk':'no'); }
function finalizeChecks(c, inc, extra){
  const fail=c.some(x=>x.st==='no'), chk=c.some(x=>x.st==='chk');
  let status,label;
  if(fail){ status='no'; label='자격 미충족'; }
  else if(extra && extra.onlyLottery){ status='check'; label='추첨공급만 가능(1인가구)'; }
  else if(chk){ status='check'; label=(inc&&(inc.tier==='추첨'||inc.tier==='추첨확인'))?'추첨 대상 가능(자산 확인)':'추가 확인 필요'; }
  else { status='ok'; label=(inc&&inc.tier?inc.tier:'')+' 대상 가능'; }
  return {status,label,checks:c, note:(extra&&extra.note)||''};
}

function judgeNewlywed(p, L){
  const c=[];
  if(L.spp){ if(L.spp.nw===0){ c.push(mrow('배정 물량','신혼 특공','0세대(없음)','no')); return {status:'no',label:'이 단지 물량 없음',checks:c}; } c.push(mrow('배정 물량','신혼 특공','실제 '+L.spp.nw+'세대','ok')); }
  else c.push(mrow('배정 물량','신혼 특공','공고 확인','chk'));
  const married7=(p.marital==='기혼'&&+p.marriageMonths<=84), pre=(p.marital==='예비'), yc=+p.minorChildren>0;
  const target=married7||pre||(isPublic(L)&&yc);
  c.push(mrow('대상','혼인 7년내·예비신혼'+(isPublic(L)?'·6세이하 자녀':''), marryMine(p), target?'ok':'no'));
  c.push(mrow('무주택','세대 전원 무주택', p.noHome===false?'유주택':(p.noHome===true?'무주택':'-'), p.noHome===false?'no':'ok'));
  c.push(mrow('청약통장','가입 6개월 이상', p.hasAccount?((+p.acctMonths||0)+'개월'):'없음', (!p.hasAccount||+p.acctMonths<6)?'no':'ok'));
  const inc=incomeRow(p,L,'newlywed'); c.push(inc.row);
  c.push(mrow('전용면적','85㎡ 이하 특공', L.area||'-','na'));
  const pr=pastRow(p); if(pr) c.push(pr);
  const note = pre?'예비신혼: 입주 전(공공 나눔형은 공고일+1년 내) 혼인 증빙 필요.':((married7&&+p.marriageMonths<=24)?'혼인 2년 이내 → 공공 나눔형 우선공급(1단계) 대상 가능.':'');
  return finalizeChecks(c, inc, {note});
}

  rs.push(p.noHome===false? R('no','무주택세대구성원이 아니면 불가.') : R('ok','무주택세대구성원 요건 충족.'));
  if(p.hasAccount) rs.push(+p.acctMonths>=6? R('ok','청약통장(주택청약종합저축) 6개월 이상.'):R('no','통장 6개월 미만 → 신청 불가.')); else rs.push(R('no','청약통장이 없어 신청 불가.'));
  rs.push(R('info','신혼희망타운은 전용 소득·자산(총자산 약 3.79억 이하 등) 기준과 별도 가점제로 선정됩니다 — 세부 기준은 공고 확인.'));
  const inc = incomeCheck(p, L, 'newlywed');

  else { status='check'; label='대상 가능(자산·가점 확인)'; }
  return V(status,label,rs,{inc});
}

const TARGET = ["서울","경기","인천"];
const dft = { region:[...TARGET], gubun:["민영","국민"], status:["open","soon"] };
let filters; try{ filters=JSON.parse(localStorage.getItem("cheongyak_filters"))||dft; }catch(e){ filters=dft; }
if(!filters.region||!filters.gubun||!filters.status) filters=dft;
function saveFilters(){ try{ localStorage.setItem("cheongyak_filters", JSON.stringify(filters)); }catch(e){} }
function today0(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function pd(s){ const m=(s||"").match(/(\d{4})-(\d{2})-(\d{2})/); return m? new Date(+m[1],+m[2]-1,+m[3]) : null; }
function statusOf(r){ const t=today0(),s=pd(r.start),e=pd(r.end);
  if(s&&t<s){ const d=Math.ceil((s-t)/864e5); return {key:"soon",label:"D-"+d,cls:"b-soon"}; }
  if(s&&e&&t>=s&&t<=e) return {key:"open",label:"접수중",cls:"b-open"};
  if(e&&t>e) return {key:"done",label:"마감",cls:"b-done"};
  return {key:"soon",label:"예정",cls:"b-soon"}; }
function esc(s){ return (s||"").replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

function render(){
  syncChips();
  const rows = SNAPSHOT.map((r,i)=>({...r,_i:i,_s:statusOf(r)}))
    .filter(r=>TARGET.includes(r.region)).filter(r=>filters.region.includes(r.region)).filter(r=>filters.gubun.includes(r.gubun)).filter(r=>filters.status.includes(r._s.key));
  const order={open:0,soon:1,done:2};
  rows.sort((a,b)=>{ if(order[a._s.key]!==order[b._s.key]) return order[a._s.key]-order[b._s.key];
    const ad=pd(a.start)?pd(a.start).getTime():0, bd=pd(b.start)?pd(b.start).getTime():0; return a._s.key==="done"?bd-ad:ad-bd; });
  const base=SNAPSHOT.filter(r=>TARGET.includes(r.region));
  const nOpen=base.filter(r=>statusOf(r).key==="open").length, nSoon=base.filter(r=>statusOf(r).key==="soon").length;
  document.getElementById("stat").innerHTML='<div><b>'+base.length+'</b> 건 (수도권)</div><div>접수중 <b>'+nOpen+'</b></div><div>예정 <b>'+nSoon+'</b></div><div style="color:#aaa">표시 '+rows.length+'건</div>';
  const c=document.getElementById("content");
  if(rows.length===0){ c.innerHTML='<div class="empty">조건에 맞는 청약이 없습니다. 필터를 조정해 보세요.</div>'; return; }
  let h='<table><thead><tr><th>상태</th><th>지역</th><th>주택명</th><th class="hide-sm">청약기간</th><th class="hide-sm">당첨발표</th></tr></thead><tbody>';
  for(const r of rows){
    h+='<tr data-i="'+r._i+'"><td><span class="badge '+r._s.cls+'">'+r._s.label+'</span></td>'+
      '<td><span class="rtag">'+r.region+'</span>'+(isRegulated(r)?'<span class="reg">규제</span>':'')+'</td>'+
      '<td><div class="name">'+esc(r.name)+'<span class="arr">자격보기 ›</span></div>'+
        '<div class="meta"><span class="gubun">'+esc(r.gubun)+' · '+esc(r.htype)+'</span> · '+esc(r.builder)+'</div></td>'+
      '<td class="hide-sm">'+esc(r.start)+' ~ '+esc(r.end)+'<div class="meta">공고 '+esc(r.notice)+'</div></td>'+
      '<td class="hide-sm">'+esc(r.win)+'</td></tr>';
  }
  h+='</tbody></table>';
  c.innerHTML=h;
  c.querySelectorAll('tbody tr').forEach(tr=>tr.addEventListener('click',()=>openDetail(+tr.dataset.i)));
}
function syncChips(){ document.querySelectorAll(".chip").forEach(ch=>{ let on=false;
  if(ch.dataset.region) on=filters.region.includes(ch.dataset.region);
  if(ch.dataset.gubun) on=filters.gubun.includes(ch.dataset.gubun);
  if(ch.dataset.status) on=filters.status.includes(ch.dataset.status);
  ch.classList.toggle("on",on); }); }
function toggle(a,v){ const i=a.indexOf(v); if(i>=0)a.splice(i,1); else a.push(v); }
document.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>{
  if(ch.dataset.region) toggle(filters.region,ch.dataset.region);
  if(ch.dataset.gubun) toggle(filters.gubun,ch.dataset.gubun);
  if(ch.dataset.status) toggle(filters.status,ch.dataset.status);
  saveFilters(); render(); }));

  h+='<div class="disc">※ 규제/물량/면적/일정은 청약홈 API 기준(갱신 시점). 소득 구간은 2025년 도시근로자 기준의 참고 계산이며, 나눔형·신혼희망타운의 자산기준, 지역우선 거주요건, 재당첨 제한, 부적격 사유 등은 공고문에 따라 달라집니다. 실제 청약 전 입주자모집공고 원문과 청약홈 「청약자격 진단」으로 확인하세요.</div>';
  document.getElementById('detailModal').innerHTML=h;
  document.getElementById('detailOverlay').classList.add('show');
}

/* ===== 프로필 폼 ===== */
function seg(name, val, opts){ return '<div class="seg" data-seg="'+name+'">'+opts.map(o=>'<button type="button" data-v="'+o[0]+'" class="'+(String(val)===String(o[0])?'on':'')+'">'+o[1]+'</button>').join('')+'</div>'; }
function openProfileForm(){
  const p = loadProfile()||{};
  const num=(k,ph)=>'<input type="number" min="0" data-k="'+k+'" value="'+(p[k]!=null?p[k]:'')+'" placeholder="'+(ph||'')+'">';
  let h='<button class="mclose" onclick="closeProfile()">×</button><h2>내 프로필</h2><div class="sub">이 브라우저에만 저장되며 외부로 전송되지 않습니다.</div>'+
    '<div class="legend"><span class="rq">필수 (자격·소득 판정)</span><span>나머지는 선택</span></div><div class="form-grid">';
  h+='<div class="fgroup">기본 (필수)</div>';
  h+='<div class="fld req full"><label>세대 전원 무주택인가요?</label>'+seg('noHome',p.noHome,[[true,'무주택'],[false,'주택 보유']])+'</div>';
  h+='<div class="fld req"><label>청약통장 보유</label>'+seg('hasAccount',p.hasAccount,[[true,'보유'],[false,'없음']])+'</div>';
  h+='<div class="fld req"><label>맞벌이 여부</label>'+seg('dualIncome',p.dualIncome,[[true,'맞벌이'],[false,'외벌이']])+'</div>';
  h+='<div class="fld req"><label>가구원 수(본인 포함)</label>'+num('householdSize','예: 3')+'</div>';
  h+='<div class="fld req"><label>세대 월평균소득(만원)</label>'+num('monthlyIncome','세전, 만원')+'</div>';
  h+='<div class="fgroup">혼인 (필수)</div>';
  h+='<div class="fld req"><label>혼인 상태</label>'+seg('marital',p.marital,[['미혼','미혼'],['예비','예비(결혼예정)'],['기혼','기혼']])+'</div>';
  h+='<div class="fld"><label>결혼 예정 시기 (예비)</label><select data-k="marryPlan"><option value="">선택</option>'+['1년 이내','2년 이내','3년 이내','미정'].map(o=>'<option '+(p.marryPlan===o?'selected':'')+'>'+o+'</option>').join('')+'</select></div>';
  h+='<div class="fld full"><label>혼인기간(개월) — 기혼</label>'+num('marriageMonths','예: 30 (84=7년, 24=2년)')+'</div>';
  h+='<div class="fgroup">특별공급 관련</div>';
  h+='<div class="fld"><label>미성년 자녀 수</label>'+num('minorChildren','명')+'</div>';
  h+='<div class="fld"><label>2년 내 출생·임신 자녀(신생아)</label>'+seg('newborn',p.newborn,[[true,'있음'],[false,'없음']])+'</div>';
  h+='<div class="fld"><label>과거 주택 소유 이력</label>'+seg('everOwned',p.everOwned,[[false,'없음'],[true,'있음']])+'</div>';
  h+='<div class="fld"><label>소득세 5년 이상 납부</label>'+seg('taxYears5',p.taxYears5,[[true,'예'],[false,'아니오']])+'</div>';
  h+='<div class="fld full"><label>세대 과거 특별공급 당첨 이력</label>'+seg('pastSpecial',p.pastSpecial,[[false,'없음'],[true,'있음']])+'</div>';
  h+='<div class="fgroup">청약통장 세부</div>';
  h+='<div class="fld"><label>통장 가입기간(개월)</label>'+num('acctMonths','예: 36')+'</div>';
  h+='<div class="fld"><label>통장 납입 횟수</label>'+num('acctCount','회')+'</div>';
  h+='<div class="fgroup">가점·추첨·거주 (선택)</div>';
  h+='<div class="fld"><label>무주택 기간(년)</label>'+num('noHomeYears','년')+'</div>';
  h+='<div class="fld"><label>부양가족 수</label>'+num('dependents','명')+'</div>';
  h+='<div class="fld"><label>세대주 여부</label>'+seg('householder',p.householder,[[true,'세대주'],[false,'세대원']])+'<span class="hint">규제지역 1순위 요건</span></div>';
  h+='<div class="fld"><label>세대 부동산가액(만원)</label>'+num('realEstate','만원')+'<span class="hint">소득 초과 시 추첨 자산요건</span></div>';
  h+='</div><div class="warnmsg" id="pwarn"></div><div class="formfoot"><button class="btn ghost" onclick="closeProfile()">취소</button><button class="btn" onclick="submitProfile()">저장</button></div>';
  document.getElementById('profileModal').innerHTML=h;
  document.getElementById('profileOverlay').classList.add('show');
  document.querySelectorAll('#profileModal .seg').forEach(sg=>{ sg.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{ sg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); })); });
}
function readSeg(name){ const sg=document.querySelector('#profileModal .seg[data-seg="'+name+'"]'); if(!sg) return undefined; const on=sg.querySelector('button.on'); if(!on) return undefined; const v=on.dataset.v; if(v==='true')return true; if(v==='false')return false; return v; }
function submitProfile(){
  const p={};
  document.querySelectorAll('#profileModal input[data-k], #profileModal select[data-k]').forEach(el=>{ const k=el.dataset.k; const v=el.value; if(v!=='') p[k]= el.type==='number'? +v : v; });
  ['noHome','householder','marital','dualIncome','newborn','everOwned','taxYears5','hasAccount','pastSpecial'].forEach(k=>{ const v=readSeg(k); if(v!==undefined) p[k]=v; });
  const labels={noHome:'무주택 여부',marital:'혼인 상태',hasAccount:'청약통장 보유',householdSize:'가구원 수',monthlyIncome:'월평균소득',dualIncome:'맞벌이 여부'};
  const missing=REQUIRED.filter(k=> p[k]===undefined || p[k]==='').map(k=>labels[k]);
  const w=document.getElementById('pwarn');
  if(missing.length){ w.style.display='block'; w.textContent='필수 항목을 입력해 주세요: '+missing.join(', '); return; }
  saveProfile(p); closeProfile(); updateProfileStatus();
}
function closeProfile(){ document.getElementById('profileOverlay').classList.remove('show'); }
function closeOverlay(){ document.getElementById('detailOverlay').classList.remove('show'); }
document.getElementById('detailOverlay').addEventListener('click',e=>{ if(e.target.id==='detailOverlay') closeOverlay(); });
document.getElementById('profileOverlay').addEventListener('click',e=>{ if(e.target.id==='profileOverlay') closeProfile(); });
document.getElementById('openProfile').addEventListener('click',openProfileForm);
function updateProfileStatus(){ const p=loadProfile(); const el=document.getElementById('pstatus');
  if(!p){ el.textContent='아직 입력 전'; }
  else { const g=gapScore(p); el.innerHTML='저장됨 · 예상 가점 <b>'+g.total+'</b>/84'+(profileComplete(p)?'':' · <span style="color:#c77700">필수 미완성</span>'); } }

document.getElementById("snapdate").textContent = "기준일 " + SNAPSHOT_DATE;
updateProfileStatus();
render();
</script>
</body>
</html>
